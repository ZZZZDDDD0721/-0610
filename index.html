<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>404 Not Found</title>

  <style>
    html {
      color-scheme: light;
    }

    body {
      margin: 0;
      padding: 0;
      background: #ffffff;
      color: #000000;
      font-family: Arial, Helvetica, sans-serif;
    }

    .error-page {
      width: 100%;
      margin-top: 55px;
      text-align: center;
    }

    h1 {
      margin: 0 0 18px;
      font-size: 32px;
      font-weight: 500;
    }

    .line {
      width: calc(100% - 40px);
      height: 1px;
      margin: 0 auto;
      background: #cfcfcf;
    }

    .server {
      margin-top: 18px;
      font-size: 14px;
      color: #222222;
    }
  </style>
</head>

<body>
  <main class="error-page">
    <h1>404 Not Found</h1>

    <div class="line"></div>

    <div class="server">nginx</div>
  </main>
</body>
</html>
