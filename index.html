<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>给宝贝的每日情话</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
      background: linear-gradient(135deg, #ffebee, #f8bbd0);
      /* 核心修改：改为 min-height，防止手机端浏览器地址栏收缩时导致全粉 */
      min-height: 100vh; 
      display: flex;
      align-items: center;
      justify-content: center;
      color: #c2185b;
      text-align: center;
      padding: 20px;
      padding-bottom: calc(20px + env(safe-area-inset-bottom)); /* 适配iPhone底部安全区 */
      overflow-x: hidden; 
      -webkit-tap-highlight-color: transparent; 
    }

    /* --- 极简漂浮爱心元素 --- */
    .floating-hearts { 
      position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
      z-index: 0; pointer-events: none; overflow: hidden; /* 固定定位，且绝不遮挡主界面 */
    }
    .heart {
      position: absolute; bottom: -50px;
      background-color: rgba(233, 30, 99, 0.15); 
      border-radius: 50%; 
      animation: floatUp linear infinite;
    }
    @keyframes floatUp {
      0% { transform: translateY(0) rotate(0deg); opacity: 0.6; }
      100% { transform: translateY(-110vh) rotate(360deg); opacity: 0; }
    }

    /* --- 核心卡片样式 --- */
    .card {
      position: relative; z-index: 1;
      background: rgba(255, 255, 255, 0.95); /* 稍微提高不透明度，让字更清晰 */
      padding: 40px 30px;
      border-radius: 24px; 
      box-shadow: 0 15px 35px rgba(233, 30, 99, 0.1); 
      max-width: 400px; width: 100%;
      backdrop-filter: blur(10px); 
    }

    h1 { font-size: 24px; margin-bottom: 10px; font-weight: 600; letter-spacing: 1px; }
    .date { font-size: 14px; color: #e91e63; margin-bottom: 20px; opacity: 0.8; }

    /* --- 情话展示区 --- */
    .message-box {
      font-size: 20px; line-height: 1.8; min-height: 160px; 
      display: flex; align-items: center; justify-content: center;
      padding: 0 10px; margin-bottom: 20px;
    }

    /* 打字机光标效果 */
    .cursor { display: inline-block; width: 2px; height: 20px; background: #e91e63; margin-left: 4px; animation: blink 1s infinite; vertical-align: middle;}
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

    /* --- 底部微文案 --- */
    .footer-note { font-size: 12px; color: #f48fb1; letter-spacing: 1px; opacity: 0.8;}

    /* --- 通用按钮基础样式与过渡 --- */
    button {
      transition: all 0.2s ease; 
      outline: none; border: none; cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    /* --- 右上角历史按钮样式 --- */
    .history-btn {
      position: absolute; top: 15px; right: 15px;
      width: 40px; height: 40px; border-radius: 50%; 
      background: linear-gradient(45deg, #ec407a, #e91e63);
      color: white; font-size: 16px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 10px rgba(233, 30, 99, 0.3);
    }
    /* 手机端按压反馈 */
    .history-btn:active { 
      transform: scale(0.85) rotate(-10deg); 
      box-shadow: 0 2px 5px rgba(233, 30, 99, 0.3);
    }

    /* --- 历史记录弹窗样式 --- */
    .modal-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.3); backdrop-filter: blur(5px);
      z-index: 10; display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none; transition: opacity 0.3s ease;
    }
    .modal-overlay.active { opacity: 1; pointer-events: auto; }

    .modal-card {
      background: white; width: 90%; max-width: 380px; max-height: 70vh;
      border-radius: 20px; padding: 30px 20px; overflow-y: auto;
      box-shadow: 0 10px 30px rgba(233, 30, 99, 0.15);
      transform: translateY(20px); transition: transform 0.3s ease;
    }
    .modal-overlay.active .modal-card { transform: translateY(0); }

    .modal-title { font-size: 18px; margin-bottom: 20px; color: #c2185b; }
    .history-item { 
      text-align: left; margin-bottom: 15px; padding-bottom: 15px; 
      border-bottom: 1px dashed #f8bbd0; font-size: 14px; line-height: 1.6; 
    }
    .history-item:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0;}
    .history-date { font-size: 12px; color: #e91e63; margin-bottom: 5px; font-weight: bold;}

    /* 底部关闭按钮样式 */
    .close-btn { 
      margin-top: 20px; background: #f8bbd0; color: #c2185b; 
      padding: 14px 0; width: 100%; font-weight: bold; border-radius: 50px; 
    }
    /* 关闭按钮按压反馈 */
    .close-btn:active { 
      background: #f48fb1; 
      transform: scale(0.95); 
    }
  </style>
</head>
<body>

  <!-- 背景装饰 -->
  <div class="floating-hearts" id="heartsContainer"></div>

  <div class="card">
    <!-- 右上角历史按钮 -->
    <button class="history-btn" onclick="openHistory()" title="查看往期情话">📖</button>

    <h1>💌 给宝贝的每日情话</h1>
    <div class="date" id="date"></div>
    
    <!-- 情话区域 -->
    <div class="message-box">
      <span id="messageText"></span><span class="cursor"></span>
    </div>

    <div class="footer-note">· 每天一句，只说给你听 ·</div>
  </div>

  <!-- 历史情话弹窗 -->
  <div class="modal-overlay" id="historyModal" onclick="closeHistory(event)">
    <div class="modal-card">
      <div class="modal-title">🕰️ 我们的专属回忆</div>
      <div id="historyList"></div>
      <button class="close-btn" onclick="closeHistory(event, true)">我知道了</button>
    </div>
  </div>

  <script>
    // ================= 你的专属情话库 =================
    const messages = [
      ["01-01", "新的一年，我的第一份心动依然是你。"],
      ["02-14", "情人节快乐！遇见你之后，每天都是情人节。"],
      ["05-20", "520快乐！我对你的爱，藏在每一次呼吸里。"],
      ["06-11", "今天没什么特别的，只是比昨天更想你了一点。"],
      ["12-25", "圣诞节我不想要礼物，只想把你抱紧一点。"],
      ["default", "想把全世界的好都给你，但首先想把我自己给你。"],
      ["default", "和你在一起的每一天，都是我最喜欢的日常。"],
      ["default", "谢谢你出现在我的人生里，让我懂得了什么是心动。"],
      ["default", "宝贝，你今天也要被我偷偷爱着哦～"],
      ["default", "你笑起来的样子，是我见过最治愈的风景。"],
      ["default", "我的世界本来很暗，是你带着星星闯了进来。"],
      ["default", "喜欢你，是这辈子做过最不需要犹豫的决定。"],
      ["default", "余生很长，我只想和你慢慢走。"]
    ];

    // 1. 初始化日期与问候语
    function initDate() {
      const now = new Date();
      const options = { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' };
      const dateStr = now.toLocaleDateString('zh-CN', options);
      
      const hour = now.getHours();
      let greeting = "晚上好";
      if (hour >= 5 && hour < 11) greeting = "早安呀";
      else if (hour >= 11 && hour < 14) greeting = "午安哦";
      
      document.getElementById('date').innerText = `${greeting} · ${dateStr}`;
    }

    // 2. 获取今天的情话
    function getTodayMessage() {
      const now = new Date();
      const mmdd = String(now.getMonth() + 1).padStart(2, '0') + '-' + String(now.getDate()).padStart(2, '0');
      
      const specificMsg = messages.find(m => m[0] === mmdd);
      if (specificMsg) return specificMsg[1];
      
      const defaults = messages.filter(m => m[0] === "default");
      return defaults[Math.floor(Math.random() * defaults.length)][1];
    }

    // 3. 打字机效果
    function playTypewriter(text) {
      const el = document.getElementById('messageText');
      el.innerText = ""; 
      let i = 0;
      const timer = setInterval(() => {
        if (i < text.length) {
          el.innerText += text.charAt(i); i++;
        } else { clearInterval(timer); }
      }, 60); 
    }

    // 4. 生成极简漂浮爱心
    function createHearts() {
      const container = document.getElementById('heartsContainer');
      for (let i = 0; i < 8; i++) { 
        const heart = document.createElement('div');
        heart.classList.add('heart');
        const size = Math.random() * 20 + 10; 
        heart.style.width = `${size}px`; heart.style.height = `${size}px`;
        heart.style.left = Math.random() * 100 + '%';
        heart.style.animationDuration = (Math.random() * 10 + 10) + 's'; 
        heart.style.animationDelay = (Math.random() * 10) + 's'; 
        container.appendChild(heart);
      }
    }

    // 5. 历史记录弹窗逻辑
    function openHistory() {
      const listEl = document.getElementById('historyList');
      listEl.innerHTML = ''; 
      
      const historyItems = messages.filter(m => m[0] !== "default");
      
      if (historyItems.length === 0) {
        listEl.innerHTML = '<div style="text-align:center; color:#ccc;">还没有特定的纪念日情话哦~</div>';
      } else {
        historyItems.forEach(item => {
          const div = document.createElement('div');
          div.className = 'history-item';
          div.innerHTML = `<div class="history-date">📅 ${item[0]}</div><div>${item[1]}</div>`;
          listEl.appendChild(div);
        });
      }
      
      document.getElementById('historyModal').classList.add('active');
    }

    function closeHistory(event, forceClose = false) {
      if (forceClose || event.target.id === 'historyModal') {
        document.getElementById('historyModal').classList.remove('active');
      }
    }

    // 页面加载执行
    window.onload = function() {
      initDate(); createHearts(); playTypewriter(getTodayMessage());
    };
  </script>
</body>
</html>
