<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>404 - 页面走丢了</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      overflow: hidden;
      font-family:
        "Microsoft YaHei",
        "PingFang SC",
        Arial,
        sans-serif;
      color: #45404a;
      background:
        radial-gradient(
          circle at 20% 20%,
          rgba(255, 255, 255, 0.95),
          transparent 35%
        ),
        linear-gradient(
          135deg,
          #f7f3f5 0%,
          #eee7ec 50%,
          #e8edf2 100%
        );
    }

    .page {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 30px;
    }

    /* 背景装饰 */

    .blur-circle {
      position: absolute;
      border-radius: 50%;
      filter: blur(8px);
      opacity: 0.55;
      pointer-events: none;
      animation: float 7s ease-in-out infinite;
    }

    .circle-one {
      top: 8%;
      left: 8%;
      width: 180px;
      height: 180px;
      background: rgba(211, 188, 204, 0.6);
    }

    .circle-two {
      right: 7%;
      bottom: 8%;
      width: 240px;
      height: 240px;
      background: rgba(184, 202, 215, 0.65);
      animation-delay: -3s;
    }

    .container {
      position: relative;
      z-index: 2;
      width: min(680px, 100%);
      padding: 60px 45px;
      text-align: center;
      background: rgba(255, 255, 255, 0.66);
      border: 1px solid rgba(255, 255, 255, 0.9);
      border-radius: 28px;
      box-shadow:
        0 25px 70px rgba(72, 60, 70, 0.13),
        inset 0 1px 0 rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }

    .error-code {
      position: relative;
      display: inline-block;
      margin-bottom: 8px;
      font-size: clamp(90px, 18vw, 150px);
      line-height: 1;
      font-weight: 800;
      letter-spacing: -8px;
      color: transparent;
      background: linear-gradient(
        135deg,
        #56505b,
        #a78e9e,
        #708392
      );
      -webkit-background-clip: text;
      background-clip: text;
      user-select: none;
    }

    .error-code::after {
      content: "";
      position: absolute;
      left: 15%;
      right: 10%;
      bottom: 4px;
      height: 12px;
      border-radius: 50%;
      background: rgba(69, 60, 67, 0.14);
      filter: blur(8px);
    }

    h1 {
      margin-bottom: 15px;
      font-size: clamp(24px, 5vw, 34px);
      font-weight: 650;
      letter-spacing: 2px;
      color: #47414a;
    }

    .description {
      max-width: 500px;
      margin: 0 auto;
      font-size: 15px;
      line-height: 2;
      color: #79717a;
    }

    .small-tip {
      margin-top: 9px;
      font-size: 12px;
      color: #aaa2aa;
    }

    .buttons {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 14px;
      margin-top: 32px;
    }

    .button {
      min-width: 145px;
      padding: 13px 23px;
      border: 1px solid transparent;
      border-radius: 100px;
      font-size: 14px;
      text-decoration: none;
      cursor: pointer;
      transition:
        transform 0.25s ease,
        box-shadow 0.25s ease,
        background 0.25s ease;
    }

    .button:hover {
      transform: translateY(-3px);
    }

    .primary-button {
      color: #fff;
      background: linear-gradient(
        135deg,
        #766773,
        #7f919d
      );
      box-shadow: 0 10px 24px rgba(100, 89, 99, 0.22);
    }

    .primary-button:hover {
      box-shadow: 0 14px 30px rgba(100, 89, 99, 0.3);
    }

    .secondary-button {
      color: #68616a;
      background: rgba(255, 255, 255, 0.55);
      border-color: rgba(109, 97, 107, 0.2);
    }

    .secondary-button:hover {
      background: rgba(255, 255, 255, 0.9);
    }

    .status {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
      margin-top: 36px;
      font-size: 12px;
      color: #aaa1a9;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #8ea697;
      box-shadow: 0 0 0 5px rgba(142, 166, 151, 0.12);
      animation: blink 2s ease-in-out infinite;
    }

    @keyframes float {
      0%,
      100% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(-18px);
      }
    }

    @keyframes blink {
      0%,
      100% {
        opacity: 0.45;
      }

      50% {
        opacity: 1;
      }
    }

    @media (max-width: 600px) {
      .container {
        padding: 45px 24px;
        border-radius: 22px;
      }

      .error-code {
        letter-spacing: -5px;
      }

      .buttons {
        flex-direction: column;
      }

      .button {
        width: 100%;
      }
    }
  </style>
</head>

<body>

  <main class="page">

    <div class="blur-circle circle-one"></div>
    <div class="blur-circle circle-two"></div>

    <section class="container">

      <div class="error-code">404</div>

      <h1>这里好像什么都没有</h1>

      <p class="description">
        你访问的页面可能已经离开，也可能从未存在过。
        <br>
        不过别担心，网站本身仍然运行正常。
      </p>

      <p class="small-tip">
        Error: The requested page could not be found.
      </p>

      <div class="buttons">

        <!-- 把 index.html 修改成你的主页地址 -->
        <a class="button primary-button" href="index.html">
          返回首页
        </a>

        <button
          class="button secondary-button"
          type="button"
          onclick="history.back()"
        >
          返回上一页
        </button>

      </div>

      <div class="status">
        <span class="status-dot"></span>
        <span>服务器连接正常 · 只是页面走丢了</span>
      </div>

    </section>

  </main>

</body>
</html>
