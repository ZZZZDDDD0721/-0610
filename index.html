<script>
    const messages = [
      ["2026-05-12", "我们在洛克相遇啦"],
      ["2026-05-15", "厚着脸向你要了微信哈哈"],
      ["2026-06-07", "光遇出入新手村，宝求带带😄"],
      ["2026-06-14", "跟你表白碰壁了呢hh"],
      ["往后的每一天", "未完待续...."]
    ];

    // ...（moodQuotes 保持不变）...

    let isSpecialDay = false;
    let currentSpecialMessages = [];

    function getTodayMessage() {
      const now = new Date();
      const year = now.getFullYear();
      const month = String(now.getMonth() + 1).padStart(2, "0");
      const day = String(now.getDate()).padStart(2, "0");

      const mmdd = `${month}-${day}`;
      const fullDate = `${year}-${month}-${day}`;

      // 查找特殊日期消息
      const special = messages.filter(item => item[0] === fullDate || item[0] === mmdd);
      
      if (special.length > 0) {
        isSpecialDay = true;
        currentSpecialMessages = special.map(item => item[1]);
        currentWarmMessage = currentSpecialMessages[0];
        return currentSpecialMessages[0];
      }

      isSpecialDay = false;
      return getMoodMessage(currentMood);
    }

    function getMoodMessage(mood = currentMood) {
      if (isSpecialDay) return currentWarmMessage; // 特殊日期不走心情语录

      const list = moodQuotes[mood] || moodQuotes.happy || [];
      let nextMessage = list[Math.floor(Math.random() * list.length)];

      if (list.length > 1) {
        let safeCount = 0;
        while (nextMessage === currentWarmMessage && safeCount < 8) {
          nextMessage = list[Math.floor(Math.random() * list.length)];
          safeCount++;
        }
      }
      currentWarmMessage = nextMessage;
      return nextMessage;
    }

    // 刷新按钮逻辑优化
    messageRefreshBtn.addEventListener("click", function(e) {
      e.stopPropagation();
      createHeartBurstAroundElement(messageRefreshBtn, 8);

      if (isSpecialDay && currentSpecialMessages.length > 1) {
        // 特殊日期有多条时才轮换
        let idx = currentSpecialMessages.indexOf(currentWarmMessage);
        idx = (idx + 1) % currentSpecialMessages.length;
        currentWarmMessage = currentSpecialMessages[idx];
        playTypewriter(currentWarmMessage);
      } else {
        playTypewriter(getMoodMessage(currentMood));
      }
    });

    // 心情切换也保护特殊日期
    moodBtns.forEach(btn => {
      btn.addEventListener("click", function(e) {
        e.stopPropagation();
        currentMood = btn.dataset.mood || "happy";

        moodBtns.forEach(item => item.classList.remove("active"));
        btn.classList.add("active");

        createHeartBurstAroundElement(btn, 8);

        if (isSpecialDay) {
          playTypewriter(currentWarmMessage); // 保持特殊消息
        } else {
          playTypewriter(getMoodMessage(currentMood));
        }
      });
    });

    // 页面加载时自动选中开心（因为今天是表白碰壁日）
    window.onload = function() {
      initDate();
      initDailyLink();
      initPastLinks();
      createHearts();

      const todayMsg = getTodayMessage();
      playTypewriter(todayMsg);

      // 自动高亮开心
      moodBtns.forEach(btn => {
        if (btn.dataset.mood === "happy") btn.classList.add("active");
        else btn.classList.remove("active");
      });
    };
</script>
